<!DOCTYPE html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
    />
    <title>Stencil Component Starter</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="/build/web-components-library.css"
    />
    <script type="module" src="/build/web-components-library.esm.js"></script>
    <script nomodule src="/build/web-components-library.js"></script>
  </head>
  <body style="width: 100%; margin: 0; background-color: #f9f9f9">
    <h1>Vanilla JS Datepicker</h1>
    <z-datepicker-vanilla></z-datepicker-vanilla>
    <h2>Considerazioni</h2>
    <ul>
      <li>Z-input: attivando l'icona, questa non è cliccabile</li>
      <li>Non gestisce l'ora</li>
    </ul>
    <h1>Flatpickr</h1>
    <z-datepicker-flatpickr></z-datepicker-flatpickr>
    <h2>Considerazioni</h2>
    <ul>
      <li>Z-input: attivando l'icona, questa non è cliccabile</li>
      <li>
        La selezione del mese e dell'anno è diversa da quella di layout e non
        personalizzabile
      </li>
    </ul>
  </body>
</html>
